<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>签筒 · 随机抽签器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f3e9d2;
    --paper-dark: #e8dbb6;
    --paper-edge: #d4c193;
    --ink: #2b2420;
    --ink-soft: #6b5d4d;
    --vermilion: #c23b22;
    --vermilion-dark: #8f2a18;
    --bamboo: #7c6a4e;
    --bamboo-light: #b89c6e;
    --gold: #b68d40;
    --shadow: rgba(43, 36, 32, 0.18);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background:
      radial-gradient(circle at 18% -10%, rgba(182,141,64,0.14), transparent 45%),
      radial-gradient(circle at 100% 110%, rgba(194,59,34,0.10), transparent 50%),
      var(--paper);
    color: var(--ink);
    font-family: "Noto Sans SC", sans-serif;
    display: flex;
    justify-content: center;
    padding: 36px 16px 64px;
  }

  .app { width: 100%; max-width: 480px; }

  .brand { text-align: center; margin-bottom: 22px; }
  .brand h1 {
    font-family: "Noto Serif SC", serif;
    font-weight: 900;
    font-size: 34px;
    letter-spacing: 0.18em;
    margin: 0 0 6px;
    color: var(--ink);
  }
  .brand .tagline {
    margin: 0;
    font-size: 13px;
    color: var(--ink-soft);
    letter-spacing: 0.03em;
  }

  .tabs {
    display: flex;
    background: var(--bamboo);
    border-radius: 14px;
    padding: 6px;
    margin-bottom: 26px;
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.25), 0 4px 10px var(--shadow);
  }
  .tab {
    flex: 1;
    text-align: center;
    padding: 11px 12px;
    border: none;
    background: transparent;
    font-family: "Noto Serif SC", serif;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.08em;
    color: rgba(243,233,210,0.72);
    border-radius: 10px;
    cursor: pointer;
    transition: background .25s ease, color .25s ease;
  }
  .tab.active {
    background: var(--paper);
    color: var(--vermilion-dark);
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  }
  .tab:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

  .page { display: none; }
  .page.active { display: block; animation: fadeIn .35s ease; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ---- 抽签页 ---- */
  .canister { display: flex; justify-content: center; margin-bottom: 6px; }
  .canister svg { width: 160px; height: auto; }

  .sticks .stick {
    transform-box: fill-box;
    transform-origin: 50% 100%;
    animation: sway 6s ease-in-out infinite;
  }
  .sticks .stick:nth-child(2) { animation-delay: .4s; }
  .sticks .stick:nth-child(3) { animation-delay: .8s; }
  .sticks .stick:nth-child(4) { animation-delay: .2s; }
  .sticks .stick:nth-child(5) { animation-delay: .6s; }
  @keyframes sway {
    0%, 100% { transform: rotate(var(--base-rot)); }
    50% { transform: rotate(calc(var(--base-rot) + 1.6deg)); }
  }

  .result-card {
    position: relative;
    min-height: 130px;
    background: var(--paper-dark);
    border: 1px solid var(--paper-edge);
    border-left: 4px solid var(--vermilion);
    border-radius: 6px;
    padding: 26px 22px;
    margin: 18px 0 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    box-shadow: 0 6px 16px var(--shadow);
    overflow: hidden;
  }
  .result-text {
    font-family: "Noto Serif SC", serif;
    font-weight: 700;
    font-size: 21px;
    line-height: 1.55;
    color: var(--ink);
    word-break: break-word;
    transition: opacity .15s ease;
  }
  .result-card.placeholder .result-text {
    font-family: "Noto Sans SC", sans-serif;
    font-weight: 400;
    font-size: 15px;
    color: var(--ink-soft);
  }
  .result-card.shuffling .result-text { opacity: .5; }
  .result-card::after {
    content: "印";
    position: absolute;
    right: 12px;
    bottom: 4px;
    font-family: "Noto Serif SC", serif;
    font-size: 50px;
    font-weight: 900;
    color: var(--vermilion);
    opacity: 0;
    transform: scale(1.4) rotate(8deg);
    transition: opacity .4s ease, transform .4s ease;
    pointer-events: none;
  }
  .result-card.settled::after { opacity: 0.16; transform: scale(1) rotate(8deg); }

  .draw-row { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .draw-btn {
    width: 108px; height: 108px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #d8513a, var(--vermilion) 55%, var(--vermilion-dark) 100%);
    border: 3px solid var(--gold);
    color: var(--paper);
    font-family: "Noto Serif SC", serif;
    font-weight: 900;
    font-size: 21px;
    letter-spacing: 0.12em;
    cursor: pointer;
    box-shadow: 0 8px 18px var(--shadow), inset 0 -4px 8px rgba(0,0,0,0.25);
    transition: transform .15s ease, box-shadow .15s ease, filter .15s ease;
    display: flex; align-items: center; justify-content: center;
  }
  .draw-btn:hover:not(:disabled) { transform: translateY(-2px); }
  .draw-btn:active:not(:disabled), .draw-btn.pressed {
    transform: scale(0.92) rotate(-3deg);
    box-shadow: 0 4px 8px var(--shadow), inset 0 -2px 6px rgba(0,0,0,0.3);
  }
  .draw-btn:disabled { filter: grayscale(0.55) brightness(0.88); cursor: not-allowed; }
  .draw-btn:focus-visible { outline: 2px solid var(--gold); outline-offset: 3px; }

  .count-label { font-size: 13px; color: var(--ink-soft); letter-spacing: 0.02em; }

  /* ---- 编辑页 ---- */
  .section-title {
    font-family: "Noto Serif SC", serif;
    font-weight: 700;
    font-size: 14px;
    color: var(--ink-soft);
    margin: 22px 0 10px;
    letter-spacing: 0.04em;
  }
  .section-title:first-child { margin-top: 0; }

  .add-row { display: flex; gap: 8px; }
  .text-input, textarea.text-input {
    flex: 1;
    padding: 12px 13px;
    border-radius: 8px;
    border: 1px solid var(--paper-edge);
    background: var(--paper-dark);
    color: var(--ink);
    font-family: "Noto Sans SC", sans-serif;
    font-size: 14.5px;
  }
  .text-input:focus-visible { outline: 2px solid var(--gold); outline-offset: 1px; }
  textarea.text-input { resize: vertical; min-height: 70px; line-height: 1.5; }

  .btn-primary {
    padding: 0 18px;
    border: none;
    border-radius: 8px;
    background: var(--vermilion);
    color: var(--paper);
    font-family: "Noto Sans SC", sans-serif;
    font-weight: 600;
    font-size: 14.5px;
    cursor: pointer;
    transition: background .2s ease;
    white-space: nowrap;
  }
  .btn-primary:hover:not(:disabled) { background: var(--vermilion-dark); }
  .btn-primary:disabled { background: var(--bamboo-light); cursor: not-allowed; }
  .btn-primary:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

  .bulk-toggle {
    background: none;
    border: none;
    color: var(--vermilion-dark);
    font-size: 13.5px;
    font-family: "Noto Sans SC", sans-serif;
    cursor: pointer;
    padding: 8px 0 2px;
  }
  .bulk-panel { display: none; flex-direction: column; gap: 8px; margin-top: 6px; }
  .bulk-panel.open { display: flex; }
  .bulk-hint { font-size: 12px; color: var(--ink-soft); margin: 0; }
  .bulk-actions { display: flex; justify-content: flex-end; }

  .item-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 8px; }
  .item-row {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    background: var(--paper-dark);
    border: 1px solid var(--paper-edge);
    border-left: 3px solid var(--bamboo-light);
    border-radius: 6px;
    padding: 10px 10px 10px 12px;
  }
  .item-text {
    flex: 1; font-size: 14.5px; padding: 3px 5px; border-radius: 4px; cursor: text;
    word-break: break-word;
  }
  .item-text:hover { background: rgba(182,141,64,0.14); }
  .item-edit-input {
    flex: 1; font-size: 14.5px; padding: 3px 5px;
    border: 1px solid var(--gold); border-radius: 4px;
    font-family: inherit; background: var(--paper); color: var(--ink);
  }
  .item-delete {
    border: none; background: transparent; color: var(--vermilion);
    font-size: 19px; line-height: 1; cursor: pointer; padding: 2px 7px; border-radius: 4px;
    flex-shrink: 0;
  }
  .item-delete:hover { background: rgba(194,59,34,0.14); }
  .item-delete:focus-visible { outline: 2px solid var(--gold); }

  .empty-state {
    text-align: center; color: var(--ink-soft); font-size: 13.5px;
    padding: 22px 12px; border: 1px dashed var(--paper-edge); border-radius: 8px;
  }

  .btn-ghost-danger {
    width: 100%;
    margin-top: 22px;
    padding: 11px;
    border: 1px dashed var(--vermilion);
    background: transparent;
    color: var(--vermilion-dark);
    border-radius: 8px;
    font-size: 13.5px;
    font-family: "Noto Sans SC", sans-serif;
    cursor: pointer;
    transition: background .2s ease;
  }
  .btn-ghost-danger:hover { background: rgba(194,59,34,0.08); }

  .storage-note {
    display: none;
    font-size: 11.5px;
    color: var(--ink-soft);
    text-align: center;
    margin-top: 14px;
  }

  @media (prefers-reduced-motion: reduce) {
    .sticks .stick { animation: none !important; transform: rotate(var(--base-rot)); }
    .page.active { animation: none; }
  }
</style>
</head>
<body>
  <div class="app">
    <header class="brand">
      <h1>签 筒</h1>
      <p class="tagline">把所有可能放进签筒，抽一支，定一件事</p>
    </header>

    <nav class="tabs">
      <button class="tab active" id="tabDraw" type="button">抽签</button>
      <button class="tab" id="tabEdit" type="button">整理签筒</button>
    </nav>

    <main>
      <!-- Page 1: 抽签 -->
      <section class="page active" id="pageDraw">
        <div class="canister">
          <svg viewBox="0 0 200 210" aria-hidden="true">
            <defs>
              <linearGradient id="bambooGrad" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0" stop-color="var(--bamboo-light)"/>
                <stop offset="1" stop-color="var(--bamboo)"/>
              </linearGradient>
              <linearGradient id="stickGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0" stop-color="var(--gold)"/>
                <stop offset="1" stop-color="var(--bamboo-light)"/>
              </linearGradient>
            </defs>

            <ellipse cx="100" cy="192" rx="44" ry="9" fill="var(--bamboo)" opacity="0.35"/>

            <g class="sticks">
              <g class="stick" style="--base-rot:-24deg;">
                <rect x="97" y="10" width="6" height="85" rx="3" fill="url(#stickGrad)"/>
              </g>
              <g class="stick" style="--base-rot:-12deg;">
                <rect x="97" y="22" width="6" height="73" rx="3" fill="url(#stickGrad)"/>
                <circle cx="100" cy="22" r="4.5" fill="var(--vermilion)"/>
              </g>
              <g class="stick" style="--base-rot:0deg;">
                <rect x="97" y="5" width="6" height="90" rx="3" fill="url(#stickGrad)"/>
              </g>
              <g class="stick" style="--base-rot:12deg;">
                <rect x="97" y="20" width="6" height="75" rx="3" fill="url(#stickGrad)"/>
                <circle cx="100" cy="20" r="4.5" fill="var(--vermilion)"/>
              </g>
              <g class="stick" style="--base-rot:24deg;">
                <rect x="97" y="14" width="6" height="81" rx="3" fill="url(#stickGrad)"/>
              </g>
            </g>

            <rect x="55" y="95" width="90" height="92" rx="14" fill="url(#bambooGrad)"/>
            <ellipse cx="100" cy="95" rx="45" ry="13" fill="var(--bamboo-light)" stroke="var(--bamboo)" stroke-width="2"/>
            <ellipse cx="100" cy="93" rx="33" ry="8" fill="#5d4d36" opacity="0.55"/>
            <line x1="58" y1="126" x2="142" y2="126" stroke="var(--bamboo)" stroke-width="2.5" opacity="0.55"/>
            <line x1="58" y1="160" x2="142" y2="160" stroke="var(--bamboo)" stroke-width="2.5" opacity="0.55"/>
          </svg>
        </div>

        <div class="result-card placeholder" id="resultCard" aria-live="polite">
          <p class="result-text" id="resultText">正在打开签筒…</p>
        </div>

        <div class="draw-row">
          <button class="draw-btn" id="drawBtn" type="button" disabled>抽签</button>
          <p class="count-label" id="countLabelDraw">签筒中共有 0 支签</p>
        </div>
      </section>

      <!-- Page 2: 整理签筒 -->
      <section class="page" id="pageEdit">
        <p class="section-title">添加新签</p>
        <div class="add-row">
          <input type="text" class="text-input" id="singleInput" placeholder="输入一条内容，回车即可添加" disabled>
          <button class="btn-primary" id="singleAddBtn" type="button" disabled>添加</button>
        </div>
        <button class="bulk-toggle" id="bulkToggleBtn" type="button">＋ 批量添加（每行一条）</button>
        <div class="bulk-panel" id="bulkPanel">
          <textarea class="text-input" id="bulkTextarea" placeholder="第一条内容&#10;第二条内容&#10;第三条内容…"></textarea>
          <p class="bulk-hint">每一行会被当作一条独立内容</p>
          <div class="bulk-actions">
            <button class="btn-primary" id="bulkAddBtn" type="button" disabled>添加全部</button>
          </div>
        </div>

        <p class="section-title" id="listTitle">当前签筒（0）</p>
        <ul class="item-list" id="itemList"></ul>
        <div class="empty-state" id="emptyState" style="display:none;">签筒还是空的，先在上面添加几条内容吧</div>

        <button class="btn-ghost-danger" id="clearAllBtn" type="button">清空整个签筒</button>
        <p class="storage-note" id="storageNote">提示：当前环境暂不支持自动保存，刷新页面后列表会恢复为初始内容</p>
      </section>
    </main>
  </div>

<script>
(function () {
  const STORAGE_KEY = 'lottery-items';
  const CLEAR_LABEL = '清空整个签筒';
  const hasStorage = typeof window.storage !== 'undefined';

  let items = [];
  let idCounter = 0;
  let isAnimating = false;
  let hasDrawnOnce = false;
  let clearArmed = false;
  let clearArmTimer = null;

  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // ---- elements ----
  const tabDraw = document.getElementById('tabDraw');
  const tabEdit = document.getElementById('tabEdit');
  const pageDraw = document.getElementById('pageDraw');
  const pageEdit = document.getElementById('pageEdit');

  const resultCard = document.getElementById('resultCard');
  const resultText = document.getElementById('resultText');
  const drawBtn = document.getElementById('drawBtn');
  const countLabelDraw = document.getElementById('countLabelDraw');

  const singleInput = document.getElementById('singleInput');
  const singleAddBtn = document.getElementById('singleAddBtn');
  const bulkToggleBtn = document.getElementById('bulkToggleBtn');
  const bulkPanel = document.getElementById('bulkPanel');
  const bulkTextarea = document.getElementById('bulkTextarea');
  const bulkAddBtn = document.getElementById('bulkAddBtn');
  const listTitle = document.getElementById('listTitle');
  const itemListEl = document.getElementById('itemList');
  const emptyStateEl = document.getElementById('emptyState');
  const clearAllBtn = document.getElementById('clearAllBtn');
  const storageNote = document.getElementById('storageNote');

  function genId() {
    idCounter += 1;
    return 'i' + Date.now() + '-' + idCounter;
  }

  function defaultItems() {
    return [
      { id: genId(), text: '如何理解习近平新时代中国特色社会主义思想是“两个结合”的重大成果' },
      { id: genId(), text: '如何理解中国特色社会主义是历史和人民的选择' },
      { id: genId(), text: '如何理解中国特色社会主义新时代的科学内涵和重大意义' },
      { id: genId(), text: '如何理解中国式现代化创造了人类文明新形态' },
      { id: genId(), text: '如何理解中国最大的国情就是中国共产党的领导' },
      { id: genId(), text: '如何理解坚持人民至上' },
      { id: genId(), text: '如何理解坚持全面深化改革开放的正确方向' },
      { id: genId(), text: '如何理解建设现代化经济体系' },
      { id: genId(), text: '如何理解全过程人民民主是社会主义民主政治的本质属性' },
      { id: genId(), text: '如何理解统筹处理全面依法治国的重大关系' },
      { id: genId(), text: '如何理解弘扬以伟大建党精神为源头的中国共产党人精神谱系' },
      { id: genId(), text: '如何理解绿水青山就是金山银山，建设美丽中国' }
    ];
  }

  async function loadItems() {
    if (hasStorage) {
      try {
        const res = await window.storage.get(STORAGE_KEY, false);
        if (res && res.value) {
          items = JSON.parse(res.value);
        } else {
          items = defaultItems();
          await persist();
        }
      } catch (e) {
        items = defaultItems();
        await persist();
      }
    } else {
      items = defaultItems();
      storageNote.style.display = 'block';
    }
  }

  async function persist() {
    if (!hasStorage) return;
    try {
      await window.storage.set(STORAGE_KEY, JSON.stringify(items), false);
    } catch (e) {
      console.error('保存失败', e);
    }
  }

  // ---- tabs ----
  function switchPage(which) {
    const isDraw = which === 'draw';
    tabDraw.classList.toggle('active', isDraw);
    tabEdit.classList.toggle('active', !isDraw);
    pageDraw.classList.toggle('active', isDraw);
    pageEdit.classList.toggle('active', !isDraw);
    if (isDraw) renderDrawState();
  }
  tabDraw.addEventListener('click', () => switchPage('draw'));
  tabEdit.addEventListener('click', () => switchPage('edit'));

  // ---- render ----
  function renderCount() {
    const n = items.length;
    countLabelDraw.textContent = '签筒中共有 ' + n + ' 支签';
    listTitle.textContent = '当前签筒（' + n + '）';
  }

  function renderDrawState() {
    const has = items.length > 0;
    drawBtn.disabled = !has;
    if (!has) {
      resultCard.classList.add('placeholder');
      resultCard.classList.remove('settled', 'shuffling');
      resultText.textContent = '签筒空空如也，请先去"整理签筒"添加内容';
    } else if (!hasDrawnOnce) {
      resultCard.classList.add('placeholder');
      resultText.textContent = '点击下方红色印章，抽出一支签';
    }
  }

  function renderList() {
    itemListEl.innerHTML = '';
    if (items.length === 0) {
      emptyStateEl.style.display = 'block';
      return;
    }
    emptyStateEl.style.display = 'none';
    items.forEach(item => {
      const li = document.createElement('li');
      li.className = 'item-row';

      const span = document.createElement('span');
      span.className = 'item-text';
      span.textContent = item.text;
      span.title = '点击编辑';
      span.addEventListener('click', () => startEdit(li, item));

      const delBtn = document.createElement('button');
      delBtn.className = 'item-delete';
      delBtn.innerHTML = '&times;';
      delBtn.setAttribute('aria-label', '删除此条');
      delBtn.addEventListener('click', () => deleteItem(item.id));

      li.appendChild(span);
      li.appendChild(delBtn);
      itemListEl.appendChild(li);
    });
  }

  function startEdit(li, item) {
    const span = li.querySelector('.item-text');
    if (!span) return;
    const input = document.createElement('input');
    input.className = 'item-edit-input';
    input.value = item.text;
    li.replaceChild(input, span);
    input.focus();
    input.select();

    let done = false;
    const finish = () => {
      if (done) return;
      done = true;
      const v = input.value.trim();
      if (v) item.text = v;
      persist();
      renderList();
      renderCount();
    };
    input.addEventListener('blur', finish);
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
    });
  }

  function deleteItem(id) {
    items = items.filter(i => i.id !== id);
    persist();
    renderList();
    renderCount();
    renderDrawState();
  }

  function addItem(text) {
    const v = (text || '').trim();
    if (!v) return false;
    items.push({ id: genId(), text: v });
    return true;
  }

  function afterListChange() {
    persist();
    renderList();
    renderCount();
    renderDrawState();
  }

  // ---- add single ----
  function handleSingleAdd() {
    if (addItem(singleInput.value)) {
      singleInput.value = '';
      afterListChange();
    }
    singleInput.focus();
  }
  singleAddBtn.addEventListener('click', handleSingleAdd);
  singleInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); handleSingleAdd(); }
  });

  // ---- bulk add ----
  bulkToggleBtn.addEventListener('click', () => {
    const open = bulkPanel.classList.toggle('open');
    bulkToggleBtn.textContent = open ? '－ 收起批量添加' : '＋ 批量添加（每行一条）';
    if (open) bulkTextarea.focus();
  });
  bulkAddBtn.addEventListener('click', () => {
    const lines = bulkTextarea.value.split('\n');
    let any = false;
    lines.forEach(l => { if (addItem(l)) any = true; });
    if (any) {
      bulkTextarea.value = '';
      afterListChange();
    }
  });

  // ---- clear all ----
  clearAllBtn.addEventListener('click', () => {
    if (items.length === 0) return;
    if (!clearArmed) {
      clearArmed = true;
      clearAllBtn.textContent = '再次点击以确认清空';
      clearArmTimer = setTimeout(() => {
        clearArmed = false;
        clearAllBtn.textContent = CLEAR_LABEL;
      }, 3000);
    } else {
      clearTimeout(clearArmTimer);
      clearArmed = false;
      clearAllBtn.textContent = CLEAR_LABEL;
      items = [];
      afterListChange();
    }
  });

  // ---- draw ----
  function doDraw() {
    if (isAnimating || items.length === 0) return;
    isAnimating = true;
    hasDrawnOnce = true;
    drawBtn.classList.add('pressed');
    resultCard.classList.remove('placeholder', 'settled');

    const finalItem = items[Math.floor(Math.random() * items.length)];
    const cycles = (reduceMotion || items.length <= 1) ? 0 : 10;

    if (cycles === 0) {
      settleResult(finalItem.text);
      return;
    }

    resultCard.classList.add('shuffling');
    let count = 0;
    const timer = setInterval(() => {
      const r = items[Math.floor(Math.random() * items.length)];
      resultText.textContent = r.text;
      count += 1;
      if (count >= cycles) {
        clearInterval(timer);
        settleResult(finalItem.text);
      }
    }, 70);
  }

  function settleResult(text) {
    resultText.textContent = text;
    resultCard.classList.remove('shuffling');
    resultCard.classList.add('settled');
    setTimeout(() => {
      drawBtn.classList.remove('pressed');
      isAnimating = false;
    }, 250);
  }

  drawBtn.addEventListener('click', doDraw);

  // ---- init ----
  async function init() {
    await loadItems();
    singleInput.disabled = false;
    singleAddBtn.disabled = false;
    bulkAddBtn.disabled = false;
    renderList();
    renderCount();
    renderDrawState();
  }
  init();
})();
</script>
</body>
</html>
